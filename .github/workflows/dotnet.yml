name: CI/CD Deploy

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: UzTube
    if: github.ref == 'refs/heads/dev'
    name: Build and Deploy to Development
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Deploy to Digital Ocean Development Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USERNAME }}
          password: ${{ secrets.DEV_PASSWORD }}
          port: ${{ secrets.DEV_PORT }}
          script: |
            echo ">>> ENTER PROJECT DIRECTORY"
            cd /home/wwlinux/projects/uztube/uztube-backend

            echo ">>> REPONI UPDATE (git pull)"
            git reset --hard HEAD
            git pull origin dev

            echo ">>> DOCKER CONTAINERS STOP"
            docker compose down || true

            echo ">>> DOCKER IMAGE REBUILD + START"
            docker compose up -d --build

            echo ">>> DEPLOYMENT COMPLETED!"