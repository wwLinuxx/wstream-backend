name: CI/CD Deploy Development Backend Server

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: wstream-backend
    if: github.ref == 'refs/heads/dev'
    name: Build and Deploy to Development Backend Server
    
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to WSTREAM Development Backend Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USERNAME }}
          password: ${{ secrets.DEV_PASSWORD }}
          port: ${{ secrets.DEV_PORT }}
          script: |
            set -e
            
            PROJECT_DIR="/home/wwlinux/projects/wstream/development/wstream-backend"
            REPO_URL="git@github.com:${{ github.repository }}.git"
            
            echo ">>> CHECKING PROJECT DIRECTORY"
            if [ ! -d "$PROJECT_DIR" ]; then
              echo ">>> CREATING PROJECT DIRECTORY"
              mkdir -p "$PROJECT_DIR"
              cd "$PROJECT_DIR"
              git clone -b dev "$REPO_URL" .
            else
              cd "$PROJECT_DIR"
            fi

            echo ">>> CLEANING GIT"
            git clean -fd
            git reset --hard HEAD
            git fetch origin
            git checkout dev
            git pull origin dev

            echo ">>> STOPPING DOCKER CONTAINERS"
            docker compose down --remove-orphans || true

            echo ">>> BUILDING AND STARTING DOCKER"
            docker compose build
            docker compose up -d

            echo ">>> CLEANING UNUSED IMAGES"
            docker image prune -f

            echo ">>> DEPLOYMENT COMPLETED SUCCESSFULLY!"