name: CI/CD Deploy Development Server

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: UzTube
    if: github.ref == 'refs/heads/dev'
    name: Build and Deploy to Development
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Deploy to UzTube Development Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USERNAME }}
          password: ${{ secrets.DEV_PASSWORD }}
          port: ${{ secrets.DEV_PORT }}
          script: |
            echo ">>> ENTERING PROJECT DIRECTORY"
            cd /home/wwlinux/projects/uztube/development/uztube-backend

            echo ">>> CLEANING GIT - Removing all local changes"
            git clean -fd
            git reset --hard HEAD
            
            echo ">>> PULLING LATEST CODE FROM DEV BRANCH"
            git fetch origin
            git checkout dev
            git pull origin dev

            echo ">>> STOPPING AND REMOVING DOCKER CONTAINERS"
            docker compose down --remove-orphans

            echo ">>> REMOVING OLD DOCKER IMAGES"
            docker rmi uztube_api:dev || true
            docker image prune -f

            echo ">>> CLEANING DOCKER BUILD CACHE"
            docker builder prune -f

            echo ">>> BUILDING NEW IMAGE AND STARTING CONTAINERS"
            docker compose build --no-cache
            docker compose up -d

            echo ">>> CLEANING UNUSED DOCKER RESOURCES"
            docker system prune -f --volumes

            echo ">>> DEPLOYMENT COMPLETED SUCCESSFULLY!"
            echo ">>> Currently running containers:"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"